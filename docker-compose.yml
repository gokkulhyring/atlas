services:
  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    ports:
      # Forwarding 6379 lets local `manage.py runserver` + local worker
      # use this same broker without installing redis on the Mac.
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: atlas-dynamodb
    # -inMemory: data lives in RAM (resets when this container restarts — just
    # re-run `seed_psp_dynamo` if that happens). -sharedDb: one shared DB file.
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports:
      - "8001:8000"   # host 8001 (8000 is taken by web); containers use :8000

  web:
    build: .
    image: atlas:latest
    container_name: atlas-web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    # host.docker.internal resolves to the Mac host, so the container reaches the
    # native Homebrew MySQL on :3306 (the same server the real Atlas app uses)
    # instead of running its own MySQL container. DB is `atlas_demo`, user `atlas`.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: &django_env
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: "change-me-to-a-long-random-string-before-real-deployment"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DJANGO_DB_HOST: "host.docker.internal"
      DJANGO_DB_PORT: "3306"
      DJANGO_DB_NAME: "atlas_demo"
      DJANGO_DB_USER: "atlas"
      DJANGO_DB_PASSWORD: "atlas"
      DJANGO_REDIS_URL: "redis://redis:6379/0"
    depends_on:
      redis:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    image: atlas:latest
    container_name: atlas-worker
    volumes:
      - .:/app
    # Same image, same code — just runs Celery instead of gunicorn.
    # Overriding the Dockerfile ENTRYPOINT skips migrate/collectstatic (web handles those).
    entrypoint: []
    command: ["celery", "-A", "atlas", "worker", "-l", "info", "--concurrency", "2"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment: *django_env
    depends_on:
      redis:
        condition: service_healthy
      dynamodb-local:
        condition: service_started
    restart: unless-stopped
